<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Data - Precise Procure</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/premium-ui.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <!-- Mobile Navigation Drawer -->
    <div id="mobileNavOverlay" class="mobile-nav-overlay" onclick="toggleMobileMenu()"></div>
    <div id="mobileNavDrawer" class="mobile-nav-drawer">
        <div class="mobile-nav-header">
            <div class="brand-logo">
                <i class="ph-bold ph-lightning" style="color: var(--primary);"></i> Precise Procure
            </div>
            <button class="mobile-nav-close" onclick="toggleMobileMenu()">
                <i class="ph ph-x"></i>
            </button>
        </div>
        <div class="mobile-nav-items">
            <a href="/sales.html" class="mobile-nav-item">
                <i class="ph ph-shopping-cart"></i>
                Sales Dashboard
            </a>
            <a href="/sourcing.html" class="mobile-nav-item">
                <i class="ph ph-package"></i>
                Sourcing
            </a>
            <div
                style="padding: 0 1rem; margin: 0.5rem 0; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;">
                Master Data</div>
            <a href="/masters.html?type=materials" class="mobile-nav-item">
                <i class="ph ph-package"></i>
                Materials
            </a>
            <a href="/masters.html?type=employees" class="mobile-nav-item">
                <i class="ph ph-users"></i>
                Employees
            </a>
            <a href="/masters.html?type=customers" class="mobile-nav-item">
                <i class="ph ph-user-circle"></i>
                Customers
            </a>
            <a href="/masters.html?type=vendors" class="mobile-nav-item">
                <i class="ph ph-storefront"></i>
                Vendors
            </a>
            <a href="#" class="mobile-nav-item" onclick="logout()">
                <i class="ph ph-sign-out"></i>
                Logout
            </a>
        </div>
    </div>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="flex items-center gap-2 logo-text">
                    <i class="ph ph-gauge" style="font-size: 1.5rem; color: var(--primary);"></i>
                    <span>Precise Procure</span>
                </div>
                <!-- 
                <button class="toggle-btn" onclick="toggleSidebar()">
                    <i class="ph ph-list"></i>
                </button>
                -->
            </div>

            <nav class="sidebar-nav">
                <a href="/sales.html" class="nav-item">
                    <i class="ph ph-shopping-cart"></i>
                    <span>Sales Dashboard</span>
                </a>
                <a href="/sourcing.html" class="nav-item">
                    <i class="ph ph-package"></i>
                    <span>Sourcing</span>
                </a>
                <div style="height: 1px; background: var(--border); margin: 0.5rem 0;"></div>
                <div style="padding: 0 1rem; margin-bottom: 0.5rem; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;"
                    class="menu-label">Master Data</div>
                <a href="/masters.html?type=materials" class="nav-item" id="nav-materials">
                    <i class="ph ph-package"></i>
                    <span>Materials</span>
                </a>
                <a href="/masters.html?type=employees" class="nav-item" id="nav-employees">
                    <i class="ph ph-users"></i>
                    <span>Employees</span>
                </a>
                <a href="/masters.html?type=customers" class="nav-item" id="nav-customers">
                    <i class="ph ph-user-circle"></i>
                    <span>Customers</span>
                </a>
                <a href="/masters.html?type=vendors" class="nav-item" id="nav-vendors">
                    <i class="ph ph-storefront"></i>
                    <span>Vendors</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <div
                        style="width: 32px; height: 32px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white;">
                        <i class="ph ph-user"></i>
                    </div>
                    <div class="user-info" style="flex: 1; overflow: hidden;">
                        <div style="font-weight: 600; font-size: 0.875rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"
                            id="navUserName">Admin</div>
                        <div style="font-size: 0.75rem; color: var(--text-secondary);">Administrator</div>
                    </div>
                    <button onclick="logout()" class="toggle-btn" title="Logout">
                        <i class="ph ph-sign-out"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="header flex-between mb-4"
                style="background: transparent; border: none; padding: 0; box-shadow: none;">
                <div class="flex items-center gap-3">
                    <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">
                        <i class="ph ph-list"></i>
                    </button>
                    <div>
                        <h1 id="pageTitle"><i class="ph ph-database"></i> Master Data</h1>

                        <p class="text-muted">Manage your <span id="masterType"></span></p>
                    </div>
                    <div class="flex gap-2">
                        <button class="btn btn-secondary" onclick="window.location.href='/admin.html'">
                            <i class="ph ph-arrow-left"></i> Back to Dashboard
                        </button>
                    </div>
                </div>

                <!-- Action Bar -->
                <div class="card mb-3" style="padding: 1rem;">
                    <div class="flex-between">
                        <div class="flex gap-2">
                            <button class="btn btn-primary" onclick="showAddModal()">
                                <i class="ph ph-plus-circle"></i> Add New
                            </button>
                            <button class="btn btn-secondary" onclick="loadData()">
                                <i class="ph ph-arrows-clockwise"></i> Refresh
                            </button>
                        </div>
                        <div>
                            <input type="text" id="searchInput" placeholder="Search..." style="width: 300px;"
                                onkeyup="filterData()">
                        </div>
                    </div>
                </div>

                <!-- Data Table -->
                <div class="card" style="padding: 1.5rem;">
                    <div class="table-responsive">
                        <table class="table" id="dataTable">
                            <thead id="tableHeader"></thead>
                            <tbody id="tableBody">
                                <tr>
                                    <td colspan="10" class="text-center">
                                        <div class="spinner"></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div id="formModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Add Item</h3>
                <button class="close-btn" onclick="closeFormModal()">&times;</button>
            </div>

            <form id="dataForm">
                <div id="formFields" style="padding: 1.5rem;"></div>

                <div class="flex gap-2"
                    style="padding: 1rem 1.5rem; border-top: 1px solid var(--border); justify-content: flex-end; background: var(--bg-hover); border-radius: 0 0 0.5rem 0.5rem;">
                    <button type="button" class="btn btn-secondary" onclick="closeFormModal()">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-success">
                        <i class="ph ph-check"></i> Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/masters.js"></script>
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
            localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Restore sidebar state
            const sidebar = document.getElementById('sidebar');
            const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
            if (isCollapsed) {
                sidebar.classList.add('collapsed');
            }

            // Set user name
            const user = getUser();
            if (user) {
                document.getElementById('navUserName').textContent = user.name;
            }

            // Highlight active link
            const params = new URLSearchParams(window.location.search);
            const masterType = params.get('type');
            if (masterType) {
                document.getElementById(`nav-${masterType}`)?.classList.add('active');
            }
        });
    </script>
</body>

</html>
